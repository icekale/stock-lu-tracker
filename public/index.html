<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>持仓跟踪台</title>
    <link rel="stylesheet" href="/replica.css" />
    <link rel="stylesheet" href="/site-footer.css" />
  </head>
  <body class="replica-body home-page">
    <nav class="apple-nav">
      <div class="apple-nav-inner">
        <p class="nav-brand">超级鹿鼎公持仓自动跟踪</p>
        <div class="nav-links">
          <p class="nav-subtitle">主页看板</p>
          <a class="nav-link-btn" href="/admin.html">后台配置</a>
        </div>
      </div>
    </nav>

    <main class="replica-wrap">
      <section class="replica-card">
        <header class="replica-top">
          <div class="replica-tabs" role="tablist" aria-label="持仓视图">
            <button
              id="tabLatestBtn"
              type="button"
              class="replica-tab-btn"
              role="tab"
              aria-selected="false"
              aria-controls="latestView"
              tabindex="-1"
            >
              <span class="tab-icon">🧳</span>
              最新持仓
            </button>
            <button
              id="tabAdjustBtn"
              type="button"
              class="replica-tab-btn active"
              role="tab"
              aria-selected="true"
              aria-controls="adjustView"
              tabindex="0"
            >
              <span class="tab-icon">⇄</span>
              调仓记录
            </button>
          </div>

          <label class="month-switch" for="snapshotSelect">
            月份
            <select id="snapshotSelect"></select>
          </label>
        </header>

        <section class="overview-strip" aria-label="总览统计">
          <div class="overview-item">
            <p class="overview-label">总市值</p>
            <p class="overview-value" id="totalMarketValue">-</p>
          </div>
          <div class="overview-item">
            <p class="overview-label">环比变化</p>
            <p class="overview-value" id="marketValueMoM">-</p>
          </div>
          <div class="overview-item">
            <p class="overview-label">净值指数</p>
            <p class="overview-value" id="netIndexValue">-</p>
          </div>
          <div class="overview-item">
            <p class="overview-label">年初净值指数</p>
            <p class="overview-value" id="yearStartIndexValue">-</p>
          </div>
          <div class="overview-item">
            <p class="overview-label">持仓数量</p>
            <p class="overview-value" id="holdingCount">-</p>
          </div>
        </section>

        <section
          id="adjustView"
          class="replica-view"
          role="tabpanel"
          aria-labelledby="tabAdjustBtn"
          aria-hidden="false"
        >
          <div class="table-wrap replica-table-wrap">
            <table class="replica-table adjust-table">
              <thead>
                <tr>
                  <th>代码</th>
                  <th>股票名称</th>
                  <th>操作记录</th>
                  <th>变动股数</th>
                  <th>最新成本</th>
                  <th>持仓金额</th>
                </tr>
              </thead>
              <tbody id="adjustRowsBody"></tbody>
            </table>
          </div>

          <section class="replica-subsection">
            <h3 class="sub-title open">新开仓</h3>
            <div class="table-wrap replica-table-wrap">
              <table class="replica-table open-table">
                <thead>
                  <tr>
                    <th>代码</th>
                    <th>股票名称</th>
                    <th>开仓股数</th>
                    <th>历史持仓</th>
                  </tr>
                </thead>
                <tbody id="openRowsBody"></tbody>
              </table>
            </div>
          </section>

          <section class="replica-subsection">
            <h3 class="sub-title close">已清仓</h3>
            <div class="table-wrap replica-table-wrap">
              <table class="replica-table close-table">
                <thead>
                  <tr>
                    <th>代码</th>
                    <th>股票名称</th>
                    <th>清仓股数</th>
                    <th>历史持仓</th>
                  </tr>
                </thead>
                <tbody id="closeRowsBody"></tbody>
              </table>
            </div>
          </section>
        </section>

        <section
          id="latestView"
          class="replica-view hidden"
          role="tabpanel"
          aria-labelledby="tabLatestBtn"
          hidden
          aria-hidden="true"
        >
          <div class="table-wrap replica-table-wrap">
            <table class="replica-table latest-table">
              <thead>
                <tr>
                  <th>代码</th>
                  <th>股票名称</th>
                  <th>持仓股数</th>
                  <th>最新成本</th>
                  <th>最新市值</th>
                </tr>
              </thead>
              <tbody id="latestRowsBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="replica-card networth-card">
        <header class="networth-head">
          <h3>月度净值曲线</h3>
          <p>优先使用帖子中的累积净值，其次回退到持仓市值</p>
        </header>
        <div class="networth-canvas-wrap">
          <p id="monthlyChartEmpty" class="chart-empty hidden">暂无可绘制的月度净值数据</p>
          <canvas id="monthlyNetworthChart"></canvas>
        </div>
      </section>
    </main>

    <footer class="site-footer site-footer-home" data-site-footer>
      <div class="site-footer-inner">
        <div class="site-footer-meta">
          <span class="site-footer-item" data-footer-author data-fallback="Kale">作者：Kale</span>
          <span class="site-footer-sep">·</span>
          <span class="site-footer-item" data-footer-version data-fallback="v0.1.12">版本：v0.1.12</span>
          <span class="site-footer-sep">·</span>
          <a
            class="site-footer-link"
            data-footer-github
            data-fallback="icekale/stock-lu-tracker"
            href="https://github.com/icekale/stock-lu-tracker"
            target="_blank"
            rel="noreferrer"
            aria-label="GitHub：icekale/stock-lu-tracker"
            title="GitHub：icekale/stock-lu-tracker"
          >
            <svg
              class="site-footer-github-icon"
              viewBox="0 0 16 16"
              aria-hidden="true"
              focusable="false"
            >
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.67 7.67 0 0 1 8 4.98c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
            <span class="site-footer-sr-only">GitHub：icekale/stock-lu-tracker</span>
          </a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/site-footer.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
