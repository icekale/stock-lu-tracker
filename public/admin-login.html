<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台登录</title>
    <link rel="stylesheet" href="/site-footer.css" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f5f9;
        --surface: #ffffff;
        --text: #12151f;
        --muted: #6f7685;
        --line: rgba(12, 18, 34, 0.1);
        --primary: #0071e3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 16% 20%, #e8f3ff 0%, transparent 45%),
          radial-gradient(circle at 85% 80%, #e9ecef 0%, transparent 45%), var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 24px 60px rgba(11, 15, 26, 0.08);
        padding: 28px;
      }

      .card-topbar {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 16px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 600;
        text-decoration: none;
        transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      }

      .back-link:hover {
        background: #f6f8fb;
        border-color: rgba(12, 18, 34, 0.16);
        transform: translateY(-1px);
      }

      .back-link:focus-visible {
        outline: 2px solid rgba(0, 113, 227, 0.24);
        outline-offset: 2px;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: -0.02em;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      form {
        margin-top: 20px;
        display: grid;
        gap: 12px;
      }

      input[type="password"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 42px;
        padding: 0 12px;
        font-size: 0.95rem;
      }

      input[type="password"]:focus {
        outline: 2px solid rgba(0, 113, 227, 0.24);
        border-color: rgba(0, 113, 227, 0.4);
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 12px;
        background: var(--primary);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 12px;
        font-size: 0.9rem;
        color: var(--muted);
        min-height: 1.3em;
      }

      .status.err {
        color: #cc2a2a;
      }
    </style>
  </head>
  <body class="login-page">
    <main class="card">
      <div class="card-topbar">
        <a class="back-link" href="/">← 返回主页</a>
      </div>
      <h1>后台配置登录</h1>
      <p>请输入管理密码后进入配置页面。</p>
      <form id="loginForm">
        <input id="password" type="password" placeholder="请输入后台密码" autocomplete="current-password" required />
        <button id="submitBtn" type="submit">进入后台</button>
      </form>
      <div id="status" class="status"></div>
    </main>

    <footer class="site-footer site-footer-login" data-site-footer>
      <div class="site-footer-inner">
        <div class="site-footer-meta">
          <span class="site-footer-item" data-footer-author data-fallback="Kale">作者：Kale</span>
          <span class="site-footer-sep">·</span>
          <span class="site-footer-item" data-footer-version data-fallback="v0.1.12">版本：v0.1.12</span>
          <span class="site-footer-sep">·</span>
          <a
            class="site-footer-link"
            data-footer-github
            data-fallback="icekale/stock-lu-tracker"
            href="https://github.com/icekale/stock-lu-tracker"
            target="_blank"
            rel="noreferrer"
            aria-label="GitHub：icekale/stock-lu-tracker"
            title="GitHub：icekale/stock-lu-tracker"
          >
            <svg
              class="site-footer-github-icon"
              viewBox="0 0 16 16"
              aria-hidden="true"
              focusable="false"
            >
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.67 7.67 0 0 1 8 4.98c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
            <span class="site-footer-sr-only">GitHub：icekale/stock-lu-tracker</span>
          </a>
        </div>
      </div>
    </footer>

    <script src="/site-footer.js"></script>
    <script>
      const els = {
        form: document.getElementById("loginForm"),
        password: document.getElementById("password"),
        submitBtn: document.getElementById("submitBtn"),
        status: document.getElementById("status")
      };

      const nextPath = (() => {
        const raw = new URLSearchParams(window.location.search).get("next") || "/admin.html";
        if (!raw.startsWith("/")) {
          return "/admin.html";
        }
        return raw;
      })();

      function setStatus(text, isError) {
        els.status.textContent = text || "";
        els.status.classList.toggle("err", Boolean(isError));
      }

      async function request(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {})
          }
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || "请求失败");
        }
        return data;
      }

      async function bootstrap() {
        try {
          const status = await request("/api/admin-auth/status");
          if (!status.enabled || status.authenticated) {
            window.location.replace(nextPath);
          }
        } catch (_error) {
          setStatus("无法连接服务，请稍后重试", true);
        }
      }

      els.form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = String(els.password.value || "");
        if (!password.trim()) {
          setStatus("请输入密码", true);
          return;
        }

        els.submitBtn.disabled = true;
        setStatus("正在验证...");

        try {
          await request("/api/admin-auth/login", {
            method: "POST",
            body: JSON.stringify({ password })
          });
          setStatus("登录成功，正在跳转...");
          window.location.replace(nextPath);
        } catch (error) {
          setStatus(`登录失败: ${error.message}`, true);
          els.password.select();
        } finally {
          els.submitBtn.disabled = false;
        }
      });

      bootstrap();
    </script>
  </body>
</html>
