<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台登录</title>
    <meta name="theme-color" content="#0d5cff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stock Lu Login" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/design-tokens.css" />
    <link rel="stylesheet" href="/vendor/layui/css/layui.css" />
    <link rel="stylesheet" href="/layui-theme.css" />
    <link rel="stylesheet" href="/admin-login.css" />
    <link rel="stylesheet" href="/site-footer.css" />
  </head>
  <body class="admin-login-page login-page">
    <main class="login-shell">
      <div class="login-brand">
        <p class="login-eyebrow">Admin Login</p>
        <h1 class="login-brand-title">超级鹿鼎公持仓自动跟踪</h1>
        <p class="login-brand-copy">输入管理密码后进入后台配置中心。</p>
      </div>

      <section class="layui-panel login-card">
        <div class="login-card-topbar">
          <a class="layui-btn layui-btn-primary login-back-btn" href="/">
            <i class="layui-icon layui-icon-left"></i>
            返回主页
          </a>
        </div>
        <div class="login-card-body">
          <h2 class="login-title">后台配置登录</h2>
          <p class="login-subtitle">登录后可配置抓取源、OCR、目录导入与月度校正。</p>
          <form id="loginForm" class="login-form">
            <input id="password" class="form-control login-input" type="password" placeholder="请输入后台密码" autocomplete="current-password" required />
            <button id="submitBtn" class="layui-btn layui-btn-normal layui-btn-fluid" type="submit">进入后台</button>
          </form>
          <div id="status" class="login-status"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer site-footer-login" data-site-footer>
      <div class="site-footer-inner">
        <div class="site-footer-meta">
          <span class="site-footer-item" data-footer-author data-fallback="Kale">Kale</span>
          <span class="site-footer-sep">·</span>
          <span class="site-footer-item site-footer-version" data-footer-version data-fallback="v0.1.19">v0.1.19</span>
          <span class="site-footer-sep">·</span>
          <a
            class="site-footer-link"
            data-footer-github
            data-fallback="icekale/stock-lu-tracker"
            href="https://github.com/icekale/stock-lu-tracker"
            target="_blank"
            rel="noreferrer"
            aria-label="GitHub：icekale/stock-lu-tracker"
            title="GitHub：icekale/stock-lu-tracker"
          >
            <svg class="site-footer-github-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.67 7.67 0 0 1 8 4.98c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
            <span class="site-footer-sr-only">GitHub：icekale/stock-lu-tracker</span>
          </a>
        </div>
      </div>
    </footer>

    <script src="/vendor/layui/layui.js"></script>
    <script src="/site-footer.js"></script>
    <script>
      const els = {
        form: document.getElementById("loginForm"),
        password: document.getElementById("password"),
        submitBtn: document.getElementById("submitBtn"),
        status: document.getElementById("status")
      };

      const nextPath = (() => {
        const raw = new URLSearchParams(window.location.search).get("next") || "/admin.html";
        if (!raw.startsWith("/")) {
          return "/admin.html";
        }
        return raw;
      })();

      function setStatus(text, isError) {
        els.status.textContent = text || "";
        els.status.classList.toggle("err", Boolean(isError));
      }

      async function request(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {})
          }
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || "请求失败");
        }
        return data;
      }

      async function bootstrap() {
        try {
          const status = await request("/api/admin-auth/status");
          if (!status.enabled || status.authenticated) {
            window.location.replace(nextPath);
          }
        } catch (_error) {
          setStatus("无法连接服务，请稍后重试", true);
        }
      }

      els.form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = els.password.value;
        if (!password.trim()) {
          setStatus("请输入后台密码", true);
          els.password.focus();
          return;
        }

        els.submitBtn.disabled = true;
        setStatus("登录中...");

        try {
          await request("/api/admin-auth/login", {
            method: "POST",
            body: JSON.stringify({ password })
          });
          setStatus("登录成功，正在进入后台...");
          window.location.replace(nextPath);
        } catch (error) {
          setStatus(error.message || "登录失败，请重试", true);
          els.submitBtn.disabled = false;
        }
      });

      bootstrap();
    </script>
  </body>
</html>
