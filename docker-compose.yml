services:
  stock-lu:
    image: icekale/stock-lu-tracker:v0.1.23
    container_name: stock-lu
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      TESSDATA_PREFIX: /app
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
